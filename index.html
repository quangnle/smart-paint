<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Canvas Paint - Smooth Drawing and Smart Shape Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="min-h-screen flex flex-col overflow-hidden app-shell theme-dark">
    <header class="app-header px-4 py-3 shadow-lg z-10">
        <div class="toolbar-row flex items-center gap-4 overflow-x-auto">
            <div class="flex items-center space-x-3 shrink-0">
                <div class="bg-indigo-600 p-2.5 rounded-xl shadow-md shadow-indigo-900/30">
                    <i class="fa-solid fa-wand-magic-sparkles text-xl text-white"></i>
                </div>
                <h1 class="font-bold text-lg leading-tight whitespace-nowrap">SmartPaint Canvas</h1>
            </div>

            <div class="header-controls flex items-stretch gap-3 shrink-0">
                <div class="control-card control-stack flex flex-col gap-2">
                    <div class="flex items-center justify-between gap-3">
                        <span class="control-label text-xs font-semibold app-muted">Tool</span>
                        <div class="flex items-center gap-2">
                            <span class="text-[11px] font-semibold app-muted">Smart shapes</span>
                            <label class="smart-toggle relative inline-flex items-center cursor-pointer w-fit">
                                <input type="checkbox" id="smartMode" class="sr-only peer" checked>
                                <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                            </label>
                        </div>
                    </div>
                    <div class="flex items-center gap-2" id="toolGroup">
                        <button id="drawToolBtn" class="tool-btn is-active" type="button">
                            <i class="fa-solid fa-pen"></i>
                            <span>Draw</span>
                        </button>
                        <button id="selectToolBtn" class="tool-btn" type="button">
                            <i class="fa-solid fa-vector-square"></i>
                            <span>Select</span>
                        </button>
                    </div>
                </div>

                <div class="control-card control-stack flex flex-col gap-2">
                    <div class="flex items-center justify-between gap-2">
                        <label for="brushSize" class="control-label text-xs font-semibold app-muted">Brush</label>
                        <span id="brushSizeVal" class="font-semibold text-indigo-400 text-xs min-w-[2.5rem] text-right">8px</span>
                    </div>
                    <input type="range" id="brushSize" min="2" max="30" value="8" class="slider-compact w-24 h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                </div>

                <div class="control-card control-stack flex flex-col gap-2">
                    <div class="flex items-center justify-between gap-2">
                        <label for="tolerance" class="control-label text-xs font-semibold app-muted">Sensitivity</label>
                        <span id="toleranceVal" class="font-semibold text-amber-400 text-xs min-w-[3rem] text-right">2.0px</span>
                    </div>
                    <input type="range" id="tolerance" min="0.5" max="10.0" step="0.5" value="2.0" class="slider-compact w-28 h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-amber-500">
                </div>

                <div class="control-card control-stack flex flex-col gap-2">
                    <div class="flex items-center justify-between gap-3">
                        <span class="control-label text-xs font-semibold app-muted">Palette</span>
                        <div class="flex items-center gap-2">
                            <button id="bgWhiteBtn" class="swatch-btn is-active" type="button" aria-label="White background" title="White background"></button>
                            <button id="bgBlackBtn" class="swatch-btn swatch-btn-dark" type="button" aria-label="Black background" title="Black background"></button>
                        </div>
                    </div>
                    <div class="palette-grid" id="colorPalette"></div>
                </div>

                <div class="control-card control-stack flex flex-col gap-2">
                    <span class="control-label text-xs font-semibold app-muted">Actions</span>
                    <div class="flex items-center gap-2">
                    <button id="undoBtn" class="action-btn action-btn-icon" type="button" aria-label="Undo" title="Undo">
                        <i class="fa-solid fa-rotate-left"></i>
                    </button>
                    <button id="redoBtn" class="action-btn action-btn-icon" type="button" aria-label="Redo" title="Redo">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                    <button id="copySelectionBtn" class="action-btn action-btn-icon" type="button" aria-label="Copy Selection" title="Copy Selection" disabled>
                        <i class="fa-regular fa-copy"></i>
                    </button>
                    <button id="clearBtn" class="action-btn action-btn-icon action-btn-danger" type="button" aria-label="Clear" title="Clear">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden relative app-main min-h-0">
        <section id="canvasSection" class="flex-1 relative canvas-stage overflow-hidden min-h-[420px]">
            <canvas id="liveCanvas" class="absolute inset-0 z-20 cursor-crosshair touch-none"></canvas>
            <canvas id="mainCanvas" class="absolute inset-0 z-10 pointer-events-none"></canvas>
        </section>
    </main>

    <footer class="app-footer px-6 py-2.5 flex items-center justify-between text-xs app-muted select-none z-10">
        <div><a href="https://quangle.cloud">Legos</a> 2026 - Geometry smoothing and smart shape drawing playground</div>
        <div id="statusConsole" class="status-inline text-right">Draw a stroke to get started.</div>
        <div class="flex items-center space-x-4">
            <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-emerald-500 inline-block"></span> RDP Filter</span>
            <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-indigo-500 inline-block"></span> P.J. Schneider (Cubic Bezier)</span>
            <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-amber-500 inline-block"></span> Shape Normalizer</span>
        </div>
    </footer>

    <script src="./script.js"></script>
</body>
</html>
